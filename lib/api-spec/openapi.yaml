openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Play9ja Gaming Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: wallet
    description: Wallet operations
  - name: deposit
    description: Deposit management
  - name: withdrawal
    description: Withdrawal management
  - name: membership
    description: Membership plans and status
  - name: games
    description: Games lobby and play
  - name: referral
    description: Referral system
  - name: rewards
    description: Daily rewards and streak
  - name: notifications
    description: Notification center
  - name: activity
    description: Live activity feed
  - name: dashboard
    description: Dashboard summary
  - name: leaderboard
    description: Global leaderboard
  - name: support
    description: Support links
  - name: admin
    description: Admin panel
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegistrationInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login with email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserLoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/otp/send:
    post:
      operationId: sendOtp
      tags: [auth]
      summary: Send OTP to email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpRequest"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/otp/verify:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpVerify"
      responses:
        "200":
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/password/reset-request:
    post:
      operationId: requestPasswordReset
      tags: [auth]
      summary: Request password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "200":
          description: Reset email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/password/reset:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordReset"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # USERS
  /users/profile:
    get:
      operationId: getProfile
      tags: [users]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateProfile
      tags: [users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  # DASHBOARD
  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get full dashboard summary
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # WALLET
  /wallet/balance:
    get:
      operationId: getWalletBalance
      tags: [wallet]
      summary: Get wallet balances
      responses:
        "200":
          description: Wallet balances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletBalance"

  /wallet/transactions:
    get:
      operationId: listWalletTransactions
      tags: [wallet]
      summary: Get transaction history
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [all, deposit, withdrawal, reward, game, referral, membership]
        - name: status
          in: query
          schema:
            type: string
            enum: [all, pending, completed, declined]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionList"

  # DEPOSIT
  /deposit:
    get:
      operationId: listDeposits
      tags: [deposit]
      summary: List user deposits
      responses:
        "200":
          description: Deposits list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deposit"
    post:
      operationId: createDeposit
      tags: [deposit]
      summary: Submit a deposit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositInput"
      responses:
        "201":
          description: Deposit created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deposit"

  /deposit/{id}:
    get:
      operationId: getDeposit
      tags: [deposit]
      summary: Get a single deposit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deposit detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deposit"

  # WITHDRAWAL
  /withdrawal:
    get:
      operationId: listWithdrawals
      tags: [withdrawal]
      summary: List user withdrawals
      responses:
        "200":
          description: Withdrawals list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Withdrawal"
    post:
      operationId: createWithdrawal
      tags: [withdrawal]
      summary: Submit a withdrawal request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalInput"
      responses:
        "201":
          description: Withdrawal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"
        "403":
          description: Membership required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # MEMBERSHIP
  /membership/plans:
    get:
      operationId: listMembershipPlans
      tags: [membership]
      summary: List all membership plans
      responses:
        "200":
          description: Plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MembershipPlan"

  /membership/status:
    get:
      operationId: getMembershipStatus
      tags: [membership]
      summary: Get user membership status
      responses:
        "200":
          description: Membership status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipStatus"

  /membership/purchase:
    post:
      operationId: purchaseMembership
      tags: [membership]
      summary: Purchase a membership plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MembershipPurchaseInput"
      responses:
        "201":
          description: Membership purchase submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipPurchase"

  # GAMES
  /games:
    get:
      operationId: listGames
      tags: [games]
      summary: List all games
      responses:
        "200":
          description: Games list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Game"

  /games/{id}/play:
    post:
      operationId: playGame
      tags: [games]
      summary: Play a game and get result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GamePlayInput"
      responses:
        "200":
          description: Game result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameResult"
        "403":
          description: Daily limit reached or premium required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /games/{id}/history:
    get:
      operationId: getGameHistory
      tags: [games]
      summary: Get history for a specific game
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Game history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GamePlay"

  # LEADERBOARD
  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get global leaderboard
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /winners/latest:
    get:
      operationId: getLatestWinners
      tags: [leaderboard]
      summary: Get latest winners
      responses:
        "200":
          description: Latest winners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Winner"

  # REFERRAL
  /referral:
    get:
      operationId: getReferralInfo
      tags: [referral]
      summary: Get referral code and stats
      responses:
        "200":
          description: Referral info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralInfo"

  /referral/history:
    get:
      operationId: getReferralHistory
      tags: [referral]
      summary: Get referral history
      responses:
        "200":
          description: Referral history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReferralEntry"

  /referral/rankings:
    get:
      operationId: getReferralRankings
      tags: [referral]
      summary: Get referral leaderboard
      responses:
        "200":
          description: Referral rankings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReferralRanking"

  # DAILY REWARD
  /daily-reward/status:
    get:
      operationId: getDailyRewardStatus
      tags: [rewards]
      summary: Get daily reward streak and status
      responses:
        "200":
          description: Daily reward status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyRewardStatus"

  /daily-reward/claim:
    post:
      operationId: claimDailyReward
      tags: [rewards]
      summary: Claim today's daily reward
      responses:
        "200":
          description: Reward claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyRewardClaim"
        "400":
          description: Already claimed or not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # NOTIFICATIONS
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List user notifications
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # LIVE ACTIVITY
  /activity/live:
    get:
      operationId: getLiveActivity
      tags: [activity]
      summary: Get live activity popup messages
      responses:
        "200":
          description: Live activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityMessage"

  # SUPPORT
  /support/links:
    get:
      operationId: getSupportLinks
      tags: [support]
      summary: Get support contact links
      responses:
        "200":
          description: Support links
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportLinks"

  # ADMIN - STATS
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard statistics
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  # ADMIN - USERS
  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users (admin)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserList"

  /admin/users/{id}:
    patch:
      operationId: updateAdminUser
      tags: [admin]
      summary: Update user (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteAdminUser
      tags: [admin]
      summary: Delete user (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ADMIN - MEMBERSHIPS
  /admin/memberships:
    get:
      operationId: listAdminMemberships
      tags: [admin]
      summary: List membership purchases (admin)
      responses:
        "200":
          description: Membership purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MembershipPurchase"

  /admin/memberships/{id}:
    patch:
      operationId: updateMembershipStatus
      tags: [admin]
      summary: Approve or decline a membership
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipPurchase"

  # ADMIN - DEPOSITS
  /admin/deposits:
    get:
      operationId: listAdminDeposits
      tags: [admin]
      summary: List deposits (admin)
      responses:
        "200":
          description: Deposits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deposit"

  /admin/deposits/{id}:
    patch:
      operationId: updateDepositStatus
      tags: [admin]
      summary: Approve or decline a deposit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deposit"

  # ADMIN - WITHDRAWALS
  /admin/withdrawals:
    get:
      operationId: listAdminWithdrawals
      tags: [admin]
      summary: List withdrawals (admin)
      responses:
        "200":
          description: Withdrawals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Withdrawal"

  /admin/withdrawals/{id}:
    patch:
      operationId: updateWithdrawalStatus
      tags: [admin]
      summary: Approve or decline a withdrawal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  # ADMIN - ACTIVITY MESSAGES
  /admin/activity-messages:
    get:
      operationId: listActivityMessages
      tags: [admin]
      summary: List live activity messages (admin)
      responses:
        "200":
          description: Activity messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityMessage"
    post:
      operationId: createActivityMessage
      tags: [admin]
      summary: Create a live activity message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityMessageInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityMessage"

  /admin/activity-messages/{id}:
    patch:
      operationId: updateActivityMessage
      tags: [admin]
      summary: Update a live activity message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityMessageInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityMessage"
    delete:
      operationId: deleteActivityMessage
      tags: [admin]
      summary: Delete a live activity message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ADMIN - SETTINGS
  /admin/settings:
    get:
      operationId: getAdminSettings
      tags: [admin]
      summary: Get platform settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"
    patch:
      operationId: updateAdminSettings
      tags: [admin]
      summary: Update platform settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"

  # ADMIN - BROADCAST
  /admin/broadcast:
    post:
      operationId: broadcastMessage
      tags: [admin]
      summary: Broadcast notification to all users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastInput"
      responses:
        "200":
          description: Broadcast sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ADMIN - GAMES
  /admin/games:
    get:
      operationId: listAdminGames
      tags: [admin]
      summary: List all games (admin)
      responses:
        "200":
          description: Games
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Game"

  /admin/games/{id}:
    patch:
      operationId: updateGame
      tags: [admin]
      summary: Update game settings (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GameUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: ["string", "null"]

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    User:
      type: object
      required: [id, username, email, role, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin]
        avatarUrl:
          type: ["string", "null"]
        isVerified:
          type: boolean
        isSuspended:
          type: boolean
        referralCode:
          type: string
        createdAt:
          type: string
          format: date-time

    UserProfile:
      type: object
      required: [id, username, email, role, walletBalance, referralBalance, gameBalance, pendingBalance, totalReferrals, gamesPlayed, dailyStreak, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
        avatarUrl:
          type: ["string", "null"]
        referralCode:
          type: string
        walletBalance:
          type: number
        referralBalance:
          type: number
        gameBalance:
          type: number
        pendingBalance:
          type: number
